<script>

alert("Script cargado");

const url =
"https://docs.google.com/spreadsheets/d/1M6igSdR8lXQvjEQxmt1LWeUvQB1gy1rlyKtPRzDoodA/export?format=csv&gid=529707319";

fetch(url)
  .then(response => response.text())
  .then(texto => {

    alert("Datos recibidos");

    document.getElementById("resultado").textContent =
      texto.substring(0,500);

  })
  .catch(error => {

    alert("ERROR");

    document.getElementById("resultado").textContent =
      error;

  });

</script>
