<script>

const url =
"https://docs.google.com/spreadsheets/d/1M6igSdR8lXQvjEQxmt1LWeUvQB1gy1rlyKtPRzDoodA/export?format=csv&gid=529707319";

fetch(url)
  .then(response => response.text())
  .then(csv => {

    const filas = csv.trim().split("\n");

    let html = "<table border='1'>";

    filas.forEach(fila => {

      html += "<tr>";

      fila.split(",").forEach(celda => {
        html += `<td>${celda}</td>`;
      });

      html += "</tr>";
    });

    html += "</table>";

    document.getElementById("resultado").innerHTML = html;

  });

</script>
