<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Inventario</title>
</head>

<body>

<div id="resultado">
Cargando...
</div>

<script>

const url =
"https://docs.google.com/spreadsheets/d/1M6igSdR8lXQvjEQxmt1LWeUvQB1gy1rlyKtPRzDoodA/export?format=csv&gid=529707319";

fetch(url)
  .then(response => response.text())
  .then(texto => {

    document.getElementById("resultado").innerHTML =
      "<pre>" +
      texto.substring(0,1000) +
      "</pre>";

  });

</script>

</body>
</html>
